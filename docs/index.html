<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XMU Desk Card JSON</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #f7f7f4;
        color: #1e2329;
      }
      main {
        width: min(760px, calc(100% - 32px));
        margin: 56px auto;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        line-height: 1.7;
      }
      code {
        background: #ecece6;
        border-radius: 4px;
        padding: 2px 5px;
      }
      pre {
        overflow: auto;
        background: #1f2430;
        color: #f5f7fb;
        border-radius: 8px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>XMU Desk Card JSON</h1>
      <p>这个站点给 ESP32 墨水屏电子桌牌提供课表 JSON。默认接口是 <code>schedule.json</code>。</p>
      <pre id="status">加载中...</pre>
    </main>
    <script>
      fetch("./schedule.json", { cache: "no-store" })
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("status").textContent = JSON.stringify({
            status: data.status,
            term: data.term,
            week: data.week,
            updatedAt: data.updatedAt,
            courseCount: Array.isArray(data.courses) ? data.courses.length : 0,
            next: data.next || null
          }, null, 2);
        })
        .catch((err) => {
          document.getElementById("status").textContent = String(err);
        });
    </script>
  </body>
</html>
